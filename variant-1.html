<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回甘 — 仪表盘</title>
    <style id="theme-vars">
/* Source: structured-spec */
:root {
  /* Source: structured-spec | Core surface tokens */
  --background: #ffffff;
  --foreground: #0e1115;
  --card: #ffffff;
  --card-foreground: #0e1115;
  --popover: #f9f9fa;
  --popover-foreground: #0e1115;

  /* Source: structured-spec | Semantic brand tokens */
  --primary: #0065fd;
  --primary-foreground: #ffffff;
  --secondary: #eff1f4;
  --secondary-foreground: #333942;
  --muted: #eff1f4;
  --muted-foreground: #7f8d9f;
  --accent: #e5e9ff;
  --accent-foreground: #00266b;
  --destructive: #ef4444;
  --destructive-foreground: #ffffff;
  --border: #e7eaef;
  --input: #e7eaef;
  --ring: #557fff;

  /* Source: structured-spec | Data visualization and sidebar tokens */
  --chart-1: #557fff;
  --chart-2: #0065fd;
  --chart-3: #0057da;
  --chart-4: #0043ad;
  --chart-5: #002e7d;
  --sidebar: #eff1f4;
  --sidebar-foreground: #0e1115;
  --sidebar-primary: #0065fd;
  --sidebar-primary-foreground: #ffffff;
  --sidebar-accent: #d4daff;
  --sidebar-accent-foreground: #00266b;
  --sidebar-border: #e7eaef;
  --sidebar-ring: #0065fd;

  /* Source: structured-spec | Typography tokens */
  --font-sans: Stack Sans Text, ui-sans-serif, sans-serif, system-ui;
  --font-serif: Source Serif 4, serif;
  --font-mono: JetBrains Mono, monospace;

  /* Source: structured-spec | Radius token */
  --radius: 1.2rem;

  /* Source: structured-spec | Shadow construction tokens */
  --shadow-x: 0;
  --shadow-y: 1px;
  --shadow-blur: 0px;
  --shadow-spread: 0px;
  --shadow-opacity: 0;
  --shadow-color: #0e1115;
  --shadow-2xs: 0 1px 0px 0px rgb(14 17 21 / 0);
  --shadow-xs: 0 1px 0px 0px rgb(14 17 21 / 0);
  --shadow-sm: 0 1px 0px 0px rgb(14 17 21 / 0), 0 1px 2px -1px rgb(14 17 21 / 0);
  --shadow: 0 1px 0px 0px rgb(14 17 21 / 0), 0 1px 2px -1px rgb(14 17 21 / 0);
  --shadow-md: 0 1px 0px 0px rgb(14 17 21 / 0), 0 2px 4px -1px rgb(14 17 21 / 0);
  --shadow-lg: 0 1px 0px 0px rgb(14 17 21 / 0), 0 4px 6px -1px rgb(14 17 21 / 0);
  --shadow-xl: 0 1px 0px 0px rgb(14 17 21 / 0), 0 8px 10px -1px rgb(14 17 21 / 0);
  --shadow-2xl: 0 1px 0px 0px rgb(14 17 21 / 0);

  /* Source: structured-spec | Rhythm tokens */
  --tracking-normal: 0em;
  --spacing: 0.24rem;
}

/* Source: structured-spec */
.dark {
  /* Source: structured-spec | Core surface tokens */
  --background: #0e1115;
  --foreground: #eff1f4;
  --card: #0e1115;
  --card-foreground: #eff1f4;
  --popover: #22252a;
  --popover-foreground: #e5e5e5;

  /* Source: structured-spec | Semantic brand tokens */
  --primary: #0065fd;
  --primary-foreground: #ffffff;
  --secondary: #22252a;
  --secondary-foreground: #e5e5e5;
  --muted: #161a20;
  --muted-foreground: #afbbcb;
  --accent: #00266b;
  --accent-foreground: #bfdbfe;
  --destructive: #ef4444;
  --destructive-foreground: #ffffff;
  --border: #333942;
  --input: #333942;
  --ring: #00266b;

  /* Source: structured-spec | Data visualization and sidebar tokens */
  --chart-1: #60a5fa;
  --chart-2: #3b82f6;
  --chart-3: #2563eb;
  --chart-4: #1d4ed8;
  --chart-5: #1e40af;
  --sidebar: #171717;
  --sidebar-foreground: #e5e5e5;
  --sidebar-primary: #0065fd;
  --sidebar-primary-foreground: #ffffff;
  --sidebar-accent: #00266b;
  --sidebar-accent-foreground: #bfdbfe;
  --sidebar-border: #404040;
  --sidebar-ring: #00266b;

  /* Source: structured-spec | Typography tokens */
  --font-sans: Stack Sans Text, ui-sans-serif, sans-serif, system-ui;
  --font-serif: Source Serif 4, serif;
  --font-mono: JetBrains Mono, monospace;

  /* Source: structured-spec | Radius token */
  --radius: 1.2rem;

  /* Source: structured-spec | Shadow construction tokens */
  --shadow-x: 0;
  --shadow-y: 1px;
  --shadow-blur: 0px;
  --shadow-spread: 0px;
  --shadow-opacity: 0;
  --shadow-color: #000000;
  --shadow-2xs: 0 1px 0px 0px rgb(0 0 0 / 0);
  --shadow-xs: 0 1px 0px 0px rgb(0 0 0 / 0);
  --shadow-sm: 0 1px 0px 0px rgb(0 0 0 / 0), 0 1px 2px -1px rgb(0 0 0 / 0);
  --shadow: 0 1px 0px 0px rgb(0 0 0 / 0), 0 1px 2px -1px rgb(0 0 0 / 0);
  --shadow-md: 0 1px 0px 0px rgb(0 0 0 / 0), 0 2px 4px -1px rgb(0 0 0 / 0);
  --shadow-lg: 0 1px 0px 0px rgb(0 0 0 / 0), 0 4px 6px -1px rgb(0 0 0 / 0);
  --shadow-xl: 0 1px 0px 0px rgb(0 0 0 / 0), 0 8px 10px -1px rgb(0 0 0 / 0);
  --shadow-2xl: 0 1px 0px 0px rgb(0 0 0 / 0);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--brand-background); color: var(--brand-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <aside class="flex flex-col w-60 shrink-0 border-r border-[var(--border)] bg-[var(--sidebar)] min-h-0 max-lg:w-16 max-lg:items-center max-lg:overflow-hidden">
        <!-- Logo -->
        <div class="flex items-center gap-2.5 px-4 pt-4 pb-2 max-lg:justify-center max-lg:px-0">
          <span data-icon class="w-6 h-6 shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/file.svg');background-color:var(--primary);"></span>
          <span class="text-base font-semibold truncate max-lg:hidden" style="color:var(--foreground);">回甘</span>
        </div>

        <!-- Nav items -->
        <nav class="flex-1 min-h-0 overflow-y-auto px-2.5 pt-2 pb-2 flex flex-col gap-0.5 max-lg:px-1.5" aria-label="主导航">
          <button class="flex items-center gap-2.5 w-full px-2.5 py-2 rounded-[10px] border-0 text-left text-sm cursor-pointer transition-colors duration-150 bg-[var(--background)] font-semibold max-lg:justify-center max-lg:px-0" style="color:var(--foreground);" data-dom-id="nav-dashboard" data-active="true">
            <span data-icon class="w-[18px] h-[18px] shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/house.svg');background-color:var(--primary);"></span>
            <span class="flex-1 min-w-0 truncate max-lg:hidden">仪表盘</span>
          </button>
          <button class="flex items-center gap-2.5 w-full px-2.5 py-2 rounded-[10px] border-0 text-left text-sm cursor-pointer transition-colors duration-150 bg-transparent hover:bg-[color-mix(in_srgb,var(--background)_64%,var(--sidebar))] max-lg:justify-center max-lg:px-0" style="color:var(--sidebar-foreground);" data-dom-id="nav-practice">
            <span data-icon class="w-[18px] h-[18px] shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/circle-play.svg');background-color:color-mix(in srgb, var(--foreground) 72%, var(--muted-foreground));"></span>
            <span class="flex-1 min-w-0 truncate max-lg:hidden">刷题</span>
          </button>
          <button class="flex items-center gap-2.5 w-full px-2.5 py-2 rounded-[10px] border-0 text-left text-sm cursor-pointer transition-colors duration-150 bg-transparent hover:bg-[color-mix(in_srgb,var(--background)_64%,var(--sidebar))] max-lg:justify-center max-lg:px-0" style="color:var(--sidebar-foreground);" data-dom-id="nav-errors">
            <span data-icon class="w-[18px] h-[18px] shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/circle-alert.svg');background-color:color-mix(in srgb, var(--foreground) 72%, var(--muted-foreground));"></span>
            <span class="flex-1 min-w-0 truncate max-lg:hidden">错题本</span>
          </button>
          <button class="flex items-center gap-2.5 w-full px-2.5 py-2 rounded-[10px] border-0 text-left text-sm cursor-pointer transition-colors duration-150 bg-transparent hover:bg-[color-mix(in_srgb,var(--background)_64%,var(--sidebar))] max-lg:justify-center max-lg:px-0" style="color:var(--sidebar-foreground);" data-dom-id="nav-knowledge">
            <span data-icon class="w-[18px] h-[18px] shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/folder-open.svg');background-color:color-mix(in srgb, var(--foreground) 72%, var(--muted-foreground));"></span>
            <span class="flex-1 min-w-0 truncate max-lg:hidden">知识库</span>
          </button>
          <button class="flex items-center gap-2.5 w-full px-2.5 py-2 rounded-[10px] border-0 text-left text-sm cursor-pointer transition-colors duration-150 bg-transparent hover:bg-[color-mix(in_srgb,var(--background)_64%,var(--sidebar))] max-lg:justify-center max-lg:px-0" style="color:var(--sidebar-foreground);" data-dom-id="nav-leaderboard">
            <span data-icon class="w-[18px] h-[18px] shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/star.svg');background-color:color-mix(in srgb, var(--foreground) 72%, var(--muted-foreground));"></span>
            <span class="flex-1 min-w-0 truncate max-lg:hidden">排行榜</span>
          </button>
          <button class="flex items-center gap-2.5 w-full px-2.5 py-2 rounded-[10px] border-0 text-left text-sm cursor-pointer transition-colors duration-150 bg-transparent hover:bg-[color-mix(in_srgb,var(--background)_64%,var(--sidebar))] max-lg:justify-center max-lg:px-0" style="color:var(--sidebar-foreground);" data-dom-id="nav-import">
            <span data-icon class="w-[18px] h-[18px] shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/pen-line.svg');background-color:color-mix(in srgb, var(--foreground) 72%, var(--muted-foreground));"></span>
            <span class="flex-1 min-w-0 truncate max-lg:hidden">自建题库</span>
          </button>
          <button class="flex items-center gap-2.5 w-full px-2.5 py-2 rounded-[10px] border-0 text-left text-sm cursor-pointer transition-colors duration-150 bg-transparent hover:bg-[color-mix(in_srgb,var(--background)_64%,var(--sidebar))] max-lg:justify-center max-lg:px-0" style="color:var(--sidebar-foreground);" data-dom-id="nav-ai">
            <span data-icon class="w-[18px] h-[18px] shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/message-circle-more.svg');background-color:color-mix(in srgb, var(--foreground) 72%, var(--muted-foreground));"></span>
            <span class="flex-1 min-w-0 truncate max-lg:hidden">AI助手</span>
          </button>
          <button class="flex items-center gap-2.5 w-full px-2.5 py-2 rounded-[10px] border-0 text-left text-sm cursor-pointer transition-colors duration-150 bg-transparent hover:bg-[color-mix(in_srgb,var(--background)_64%,var(--sidebar))] max-lg:justify-center max-lg:px-0" style="color:var(--sidebar-foreground);" data-dom-id="nav-settings">
            <span data-icon class="w-[18px] h-[18px] shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/grip.svg');background-color:color-mix(in srgb, var(--foreground) 72%, var(--muted-foreground));"></span>
            <span class="flex-1 min-w-0 truncate max-lg:hidden">设置</span>
          </button>
        </nav>

        <!-- User footer -->
        <div class="border-t border-[var(--sidebar-border)] px-3 py-2.5 flex items-center gap-2.5 max-lg:justify-center max-lg:px-0">
          <span class="w-7 h-7 shrink-0 rounded-full grid place-items-center text-xs font-semibold text-white" style="background:linear-gradient(135deg,var(--chart-1),var(--chart-4));">考</span>
          <span class="flex-1 min-w-0 text-[13px] truncate max-lg:hidden" style="color:var(--sidebar-foreground);">考研人</span>
        </div>
      </aside>

      <!-- Main content -->
      <div class="flex-1 min-w-0 flex flex-col min-h-0 bg-[var(--background)]">
        <!-- Top header bar -->
        <header class="h-[52px] shrink-0 px-4 flex items-center gap-3 border-b border-transparent">
          <h1 class="text-[15px] font-semibold" style="color:var(--foreground);">仪表盘</h1>
          <div class="flex-1"></div>
          <!-- Search -->
          <div class="flex items-center gap-2 h-[38px] px-3 rounded-[10px] bg-[var(--muted)] border border-transparent transition-colors duration-150 focus-within:bg-[var(--card)] focus-within:border-[var(--ring)]" style="min-width:200px;">
            <span data-icon class="w-[17px] h-[17px] shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/funnel.svg');background-color:var(--muted-foreground);"></span>
            <input class="flex-1 min-w-0 border-0 outline-0 bg-transparent text-sm" style="color:var(--foreground);" placeholder="搜索..." aria-label="搜索">
          </div>
          <!-- User action -->
          <button class="w-8 h-8 border-0 rounded-[9px] grid place-items-center cursor-pointer transition-colors duration-150 bg-transparent hover:bg-[var(--muted)]" style="color:var(--muted-foreground);" aria-label="通知">
            <span data-icon class="w-[18px] h-[18px]" style="mask-image:url('../assets/icons/dl-builtin-doubao/circle-question-mark.svg');"></span>
          </button>
        </header>

        <!-- Scroll area -->
        <div class="flex-1 min-h-0 overflow-y-auto">
          <div class="max-w-[920px] mx-auto px-6 py-4 flex flex-col gap-4">

            <!-- Hero/Motivation Banner -->
            <div class="rounded-[14px] px-6 py-5 text-left" style="background:linear-gradient(135deg,color-mix(in srgb, var(--primary) 12%, var(--card)),color-mix(in srgb, var(--primary) 6%, var(--card)));border:1px solid color-mix(in srgb, var(--primary) 20%, var(--border));">
              <h2 class="text-xl font-semibold mb-1" style="color:var(--foreground);text-wrap:balance;word-break:keep-all;overflow-wrap:break-word;">一念既出 万山无阻</h2>
              <p class="text-sm" style="color:var(--muted-foreground);">今天也要元气满满地刷题哦~</p>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
              <!-- Stat: 累计做题 -->
              <div class="rounded-[14px] border p-4 text-left transition-colors duration-160 hover:border-[color-mix(in_srgb,var(--primary)_40%,var(--border))]" style="background:var(--card);border-color:var(--border);">
                <div class="flex items-center gap-2 mb-2">
                  <span data-icon class="w-5 h-5 shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/pen-line.svg');background-color:var(--primary);"></span>
                  <span class="text-xs" style="color:var(--muted-foreground);">累计做题</span>
                </div>
                <span class="text-2xl font-semibold whitespace-nowrap" style="color:var(--foreground);font-variant-numeric:tabular-nums;">128</span>
              </div>
              <!-- Stat: 正确率 -->
              <div class="rounded-[14px] border p-4 text-left transition-colors duration-160 hover:border-[color-mix(in_srgb,var(--primary)_40%,var(--border))]" style="background:var(--card);border-color:var(--border);">
                <div class="flex items-center gap-2 mb-2">
                  <span data-icon class="w-5 h-5 shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/circle-check.svg');background-color:var(--primary);"></span>
                  <span class="text-xs" style="color:var(--muted-foreground);">正确率</span>
                </div>
                <span class="text-2xl font-semibold whitespace-nowrap" style="color:var(--foreground);font-variant-numeric:tabular-nums;">76%</span>
              </div>
              <!-- Stat: 错题总数 -->
              <div class="rounded-[14px] border p-4 text-left transition-colors duration-160 hover:border-[color-mix(in_srgb,var(--primary)_40%,var(--border))]" style="background:var(--card);border-color:var(--border);">
                <div class="flex items-center gap-2 mb-2">
                  <span data-icon class="w-5 h-5 shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/circle-alert.svg');background-color:var(--destructive);"></span>
                  <span class="text-xs" style="color:var(--muted-foreground);">错题总数</span>
                </div>
                <span class="text-2xl font-semibold whitespace-nowrap" style="color:var(--foreground);font-variant-numeric:tabular-nums;">31</span>
              </div>
              <!-- Stat: 连续打卡 -->
              <div class="rounded-[14px] border p-4 text-left transition-colors duration-160 hover:border-[color-mix(in_srgb,var(--primary)_40%,var(--border))]" style="background:var(--card);border-color:var(--border);">
                <div class="flex items-center gap-2 mb-2">
                  <span data-icon class="w-5 h-5 shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/star.svg');background-color:var(--primary);"></span>
                  <span class="text-xs" style="color:var(--muted-foreground);">连续打卡</span>
                </div>
                <span class="text-2xl font-semibold whitespace-nowrap" style="color:var(--foreground);font-variant-numeric:tabular-nums;">12天</span>
              </div>
            </div>

            <!-- My Rank Card -->
            <div class="rounded-[14px] border px-5 py-4 flex items-center gap-4 text-left" style="background:var(--card);border-color:var(--border);">
              <span data-icon class="w-8 h-8 shrink-0" style="mask-image:url('../assets/icons/dl-builtin-doubao/star.svg');background-color:var(--primary);"></span>
              <div class="flex-1 min-w-0">
                <h3 class="text-sm font-semibold mb-1" style="color:var(--foreground);">我的排名</h3>
                <div class="flex items-center gap-3 text-xs flex-wrap" style="color:var(--muted-foreground);">
                  <span>累计刷题 <strong class="font-semibold" style="color:var(--foreground);">128题</strong></span>
                  <span class="w-1 h-1 rounded-full shrink-0" style="background:currentColor;opacity:.6;"></span>
                  <span>坚持 <strong class="font-semibold" style="color:var(--foreground);">12天</strong></span>
                  <span class="w-1 h-1 rounded-full shrink-0" style="background:currentColor;opacity:.6;"></span>
                  <span>全国排名 <strong class="font-semibold" style="color:var(--primary);">#156</strong></span>
                </div>
              </div>
              <button class="h-8 px-3 rounded-full border text-xs font-medium cursor-pointer transition-colors duration-150 bg-transparent hover:bg-[var(--muted)] whitespace-nowrap shrink-0" style="color:var(--foreground);border-color:var(--border);" data-dom-id="cta-leaderboard">查看排行</button>
            </div>

            <!-- Weakness Analysis -->
            <div class="rounded-[14px] border px-5 py-4 text-left" style="background:var(--card);border-color:var(--border);">
              <h3 class="text-sm font-semibold mb-4" style="color:var(--foreground);">薄弱点图谱</h3>
              <div class="flex flex-col gap-3">
                <!-- Bar: 极限计算 65% -->
                <div class="flex items-center gap-3">
                  <span class="text-xs w-20 shrink-0 truncate" style="color:var(--foreground);">极限计算</span>
                  <div class="flex-1 min-w-0 h-2 rounded-full overflow-hidden" style="background:var(--muted);">
                    <div class="h-full rounded-full" style="width:65%;background:linear-gradient(90deg,var(--destructive),color-mix(in srgb, var(--destructive) 70%, var(--muted)));"></div>
                  </div>
                  <span class="text-xs font-medium whitespace-nowrap w-8 text-right" style="color:var(--destructive);">65%</span>
                </div>
                <!-- Bar: 积分应用 45% -->
                <div class="flex items-center gap-3">
                  <span class="text-xs w-20 shrink-0 truncate" style="color:var(--foreground);">积分应用</span>
                  <div class="flex-1 min-w-0 h-2 rounded-full overflow-hidden" style="background:var(--muted);">
                    <div class="h-full rounded-full" style="width:45%;background:linear-gradient(90deg,var(--chart-1),color-mix(in srgb, var(--chart-1) 70%, var(--muted)));"></div>
                  </div>
                  <span class="text-xs font-medium whitespace-nowrap w-8 text-right" style="color:var(--chart-1);">45%</span>
                </div>
                <!-- Bar: 矩阵特征值 30% -->
                <div class="flex items-center gap-3">
                  <span class="text-xs w-20 shrink-0 truncate" style="color:var(--foreground);">矩阵特征值</span>
                  <div class="flex-1 min-w-0 h-2 rounded-full overflow-hidden" style="background:var(--muted);">
                    <div class="h-full rounded-full" style="width:30%;background:linear-gradient(90deg,var(--primary),color-mix(in srgb, var(--primary) 70%, var(--muted)));"></div>
                  </div>
                  <span class="text-xs font-medium whitespace-nowrap w-8 text-right" style="color:var(--primary);">30%</span>
                </div>
                <!-- Bar: 概率分布 20% -->
                <div class="flex items-center gap-3">
                  <span class="text-xs w-20 shrink-0 truncate" style="color:var(--foreground);">概率分布</span>
                  <div class="flex-1 min-w-0 h-2 rounded-full overflow-hidden" style="background:var(--muted);">
                    <div class="h-full rounded-full" style="width:20%;background:linear-gradient(90deg,var(--chart-3),color-mix(in srgb, var(--chart-3) 70%, var(--muted)));"></div>
                  </div>
                  <span class="text-xs font-medium whitespace-nowrap w-8 text-right" style="color:var(--chart-3);">20%</span>
                </div>
              </div>
            </div>

            <!-- Daily Quote Footer -->
            <div class="rounded-[14px] border px-5 py-4 text-left" style="background:var(--card);border-color:var(--border);">
